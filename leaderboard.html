<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f5f7fa;
      margin: 0;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    select, button, input {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #2d3748;
      background: #1a202c;
      color: #f5f7fa;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: #2563eb;
      border: none;
    }

    button:hover {
      background: #1d4ed8;
    }

    .table-wrap {
      overflow-x: auto;
      background: #161b22;
      border-radius: 12px;
      border: 1px solid #2d3748;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 850px;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #2d3748;
    }

    th {
      background: #1f2937;
      font-weight: 700;
    }

    tr:hover td {
      background: #111827;
    }

    .muted {
      color: #9ca3af;
      margin-top: 12px;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #243041;
      font-size: 12px;
    }

    .loading, .error, .empty {
      padding: 18px;
    }

    .error {
      color: #fca5a5;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Leaderboard</h1>

    <div class="controls">
      <select id="plattformFilter">
        <option value="">Alle Plattformen</option>
      </select>

      <select id="streckeFilter">
        <option value="">Alle Strecken</option>
      </select>

      <select id="fahrzeugFilter">
        <option value="">Alle Fahrzeuge</option>
      </select>

      <button id="resetBtn">Filter zurücksetzen</button>
    </div>

    <div class="table-wrap">
      <div id="status" class="loading">Lade Leaderboard...</div>
      <table id="leaderboardTable" style="display: none;">
        <thead>
          <tr>
            <th>Rang</th>
            <th>Fahrer</th>
            <th>Plattform</th>
            <th>Strecke</th>
            <th>Fahrzeug</th>
            <th>Beste Zeit</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </div>

    <div class="muted" id="countInfo"></div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz93Qa2kM8DRh1kIxaxVlCK-uGpDjqid2Rj1lpy7x8bIRMoQ6ZvhVqpu_IH_8tDWVHf/exec";

    let leaderboardData = [];

    const statusEl = document.getElementById("status");
    const tableEl = document.getElementById("leaderboardTable");
    const bodyEl = document.getElementById("leaderboardBody");
    const countInfoEl = document.getElementById("countInfo");

    const plattformFilterEl = document.getElementById("plattformFilter");
    const streckeFilterEl = document.getElementById("streckeFilter");
    const fahrzeugFilterEl = document.getElementById("fahrzeugFilter");
    const resetBtnEl = document.getElementById("resetBtn");

    async function loadLeaderboard() {
      showStatus("Lade Leaderboard...", "loading");

      try {
        const res = await fetch(`${API_URL}?type=leaderboard`);
        const json = await res.json();

        if (!json.success || !Array.isArray(json.data)) {
          throw new Error("Ungültige Leaderboard-Daten");
        }

        leaderboardData = json.data.map(row => ({
          rang: row.rang ?? "",
          fahrer: row.fahrer ?? "",
          plattform: row.plattform ?? "",
          strecke: row.strecke ?? "",
          fahrzeug: row.fahrzeug ?? "",
          zeit: row.zeit ?? ""
        }));

        buildFilters(leaderboardData);
        renderTable();
      } catch (err) {
        showStatus(`Fehler beim Laden: ${err.message}`, "error");
      }
    }

    function buildFilters(data) {
      fillSelect(plattformFilterEl, uniqueSorted(data.map(x => x.plattform).filter(Boolean)), "Alle Plattformen");
      fillSelect(streckeFilterEl, uniqueSorted(data.map(x => x.strecke).filter(Boolean)), "Alle Strecken");
      fillSelect(fahrzeugFilterEl, uniqueSorted(data.map(x => x.fahrzeug).filter(Boolean)), "Alle Fahrzeuge");
    }

    function fillSelect(selectEl, values, defaultLabel) {
      selectEl.innerHTML = "";
      const defaultOption = document.createElement("option");
      defaultOption.value = "";
      defaultOption.textContent = defaultLabel;
      selectEl.appendChild(defaultOption);

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        selectEl.appendChild(option);
      });
    }

    function uniqueSorted(arr) {
      return [...new Set(arr)].sort((a, b) => a.localeCompare(b, "de"));
    }

    function getFilteredData() {
      const plattform = plattformFilterEl.value;
      const strecke = streckeFilterEl.value;
      const fahrzeug = fahrzeugFilterEl.value;

      return leaderboardData.filter(row => {
        if (plattform && row.plattform !== plattform) return false;
        if (strecke && row.strecke !== strecke) return false;
        if (fahrzeug && row.fahrzeug !== fahrzeug) return false;
        return true;
      });
    }

    function renderTable() {
      const filtered = getFilteredData();

      if (filtered.length === 0) {
        tableEl.style.display = "none";
        showStatus("Keine Einträge gefunden.", "empty");
        countInfoEl.textContent = "0 Einträge";
        return;
      }

      statusEl.style.display = "none";
      tableEl.style.display = "table";

      bodyEl.innerHTML = filtered.map(row => `
        <tr>
          <td>${escapeHtml(row.rang)}</td>
          <td>${escapeHtml(row.fahrer)}</td>
          <td><span class="pill">${escapeHtml(row.plattform || "-")}</span></td>
          <td>${escapeHtml(row.strecke)}</td>
          <td>${escapeHtml(row.fahrzeug)}</td>
          <td>${escapeHtml(row.zeit)}</td>
        </tr>
      `).join("");

      countInfoEl.textContent = `${filtered.length} Einträge`;
    }

    function showStatus(message, type) {
      statusEl.className = type || "";
      statusEl.textContent = message;
      statusEl.style.display = "block";
      tableEl.style.display = "none";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    plattformFilterEl.addEventListener("change", renderTable);
    streckeFilterEl.addEventListener("change", renderTable);
    fahrzeugFilterEl.addEventListener("change", renderTable);

    resetBtnEl.addEventListener("click", () => {
      plattformFilterEl.value = "";
      streckeFilterEl.value = "";
      fahrzeugFilterEl.value = "";
      renderTable();
    });

    loadLeaderboard();
  </script>
</body>
</html>
