<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahrer hinzufügen</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b0f16, #111827);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px 0;
      color: #b6c2d9;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 8px;
      font-weight: 700;
      color: #dfe7f5;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #2b3648;
      background: #0b1220;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
    }

    .row {
      display: flex;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 180px;
      padding: 14px 16px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #1f2937;
      color: #e5e7eb;
      border: 1px solid #374151;
    }

    .btn-secondary:hover {
      background: #273244;
    }

    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      display: none;
      line-height: 1.45;
    }

    .message.success {
      display: block;
      background: rgba(34,197,94,0.12);
      color: #9ae6b4;
      border: 1px solid rgba(34,197,94,0.35);
    }

    .message.error {
      display: block;
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.35);
    }

    .message.info {
      display: block;
      background: rgba(59,130,246,0.12);
      color: #bfdbfe;
      border: 1px solid rgba(59,130,246,0.35);
    }

    iframe {
      display: none;
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fahrer hinzufügen</h1>
    <p>Lege hier einen neuen Fahrer für dein Leaderboard an.</p>

    <form
      id="driverForm"
      action="https://script.google.com/macros/s/AKfycbwV3RleYLpZ3oaLJnf8-GNcp-tL52I_goIjx_RQRhdJlG2CgIlTSEsAylyQUTkq6-7E/exec"
      method="POST"
      target="hidden_iframe"
    >
      <input type="hidden" name="action" value="addDriver">

      <label for="driverName">Fahrername</label>
      <input type="text" id="driverName" name="driverName" placeholder="z. B. Ulf" required>

      <label for="discordId">Discord-ID optional</label>
      <input type="text" id="discordId" name="discordId" placeholder="z. B. 123456789012345678">

      <div class="row">
        <button type="submit" class="btn btn-primary">Fahrer speichern</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Zum Leaderboard</button>
      </div>
    </form>

    <iframe name="hidden_iframe" id="hidden_iframe"></iframe>

    <div id="message" class="message"></div>
    <div class="hint">Wenn gespeichert wurde, steht der Fahrer im Blatt „Fahrer“.</div>
  </div>

  <script>
    const form = document.getElementById("driverForm");
    const iframe = document.getElementById("hidden_iframe");
    const message = document.getElementById("message");
    let submitted = false;

    function showMessage(type, text) {
      message.className = "message " + type;
      message.textContent = text;
      message.style.display = "block";
    }

    form.addEventListener("submit", function() {
      submitted = true;
      showMessage("info", "Fahrer wird gespeichert...");
    });

    iframe.addEventListener("load", function() {
      if (!submitted) return;
      submitted = false;
      showMessage("success", "Anfrage gesendet. Prüfe jetzt dein Google Sheet „Fahrer“.");
      form.reset();
    });
  </script>
</body>
</html>
