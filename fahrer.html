<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fahrerseite</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 30px;
    }

    .card {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      color: white;
      display: none;
    }

    .status.green {
      background: #28a745;
      display: block;
    }

    .status.red {
      background: #dc3545;
      display: block;
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .small-info {
      margin-top: 10px;
      color: #555;
      font-size: 14px;
    }

    ul {
      margin-top: 20px;
      padding-left: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fahrer anlegen</h1>

    <label for="fahrername">Fahrername</label>
    <input type="text" id="fahrername" placeholder="Fahrername eingeben" />

    <label for="discordId">Discord ID</label>
    <input type="text" id="discordId" placeholder="Discord ID eingeben" />

    <div id="statusBox" class="status"></div>

    <button onclick="fahrerPruefenUndSpeichern()">Fahrer speichern</button>

    <div class="small-info">
      Fahrername muss eindeutig sein. Discord ID darf mehrfach verwendet werden.
    </div>

    <ul id="fahrerliste"></ul>
  </div>

  <script>
    const fahrerListe = [
      { fahrername: "MaxMuster", discordId: "123456789" },
      { fahrername: "Speedy", discordId: "999999999" }
    ];

    function renderListe() {
      const liste = document.getElementById("fahrerliste");
      liste.innerHTML = "";

      fahrerListe.forEach(fahrer => {
        const li = document.createElement("li");
        li.textContent = `Fahrername: ${fahrer.fahrername} | Discord ID: ${fahrer.discordId}`;
        liste.appendChild(li);
      });
    }

    function fahrerPruefenUndSpeichern() {
      const fahrername = document.getElementById("fahrername").value.trim();
      const discordId = document.getElementById("discordId").value.trim();
      const statusBox = document.getElementById("statusBox");

      if (!fahrername || !discordId) {
        statusBox.className = "status red";
        statusBox.textContent = "Bitte Fahrername und Discord ID eingeben.";
        return;
      }

      const existiertBereits = fahrerListe.some(
        fahrer => fahrer.fahrername.toLowerCase() === fahrername.toLowerCase()
      );

      if (existiertBereits) {
        statusBox.className = "status red";
        statusBox.textContent = "Dieser Fahrername existiert bereits.";
      } else {
        fahrerListe.push({ fahrername, discordId });
        statusBox.className = "status green";
        statusBox.textContent = "Fahrer erfolgreich angelegt.";
        renderListe();

        document.getElementById("fahrername").value = "";
        document.getElementById("discordId").value = "";
      }
    }

    renderListe();
  </script>
</body>
</html>
