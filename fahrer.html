<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahrer hinzufügen</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b0f16, #111827);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px 0;
      color: #b6c2d9;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 8px;
      font-weight: 700;
      color: #dfe7f5;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #2b3648;
      background: #0b1220;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.15);
    }

    .row {
      display: flex;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 180px;
      padding: 14px 16px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #1f2937;
      color: #e5e7eb;
      border: 1px solid #374151;
    }

    .btn-secondary:hover {
      background: #273244;
    }

    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      display: none;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .message.success {
      display: block;
      background: rgba(34,197,94,0.12);
      color: #9ae6b4;
      border: 1px solid rgba(34,197,94,0.35);
    }

    .message.error {
      display: block;
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.35);
    }

    .message.info {
      display: block;
      background: rgba(59,130,246,0.12);
      color: #bfdbfe;
      border: 1px solid rgba(59,130,246,0.35);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fahrer hinzufügen</h1>
    <p>Neuen Fahrer speichern und direkt im Sheet verfügbar machen.</p>

    <form id="driverForm">
      <label for="driverName">Fahrername</label>
      <input type="text" id="driverName" required>

      <label for="discordId">Discord-ID optional</label>
      <input type="text" id="discordId">

      <div class="row">
        <button type="submit" class="btn btn-primary">Fahrer speichern</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Zum Leaderboard</button>
      </div>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw14lFVD_UYtc3zbe2P8B89mVrom20ZHa_L7Bfx-Du8pOkP9yHrb0a4uuDoQSj6WrKb/exec";
    const form = document.getElementById("driverForm");
    const message = document.getElementById("message");

    function showMessage(type, text) {
      message.className = "message " + type;
      message.textContent = text;
      message.style.display = "block";
    }

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const driverName = document.getElementById("driverName").value.trim();
      const discordId = document.getElementById("discordId").value.trim();

      if (!driverName) {
        showMessage("error", "Bitte Fahrername eingeben.");
        return;
      }

      showMessage("info", "Speichere Fahrer...");

      const formData = new FormData();
      formData.append("action", "addDriver");
      formData.append("driverName", driverName);
      formData.append("discordId", discordId);

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: formData
        });

        const text = await response.text();

        let result;
        try {
          result = JSON.parse(text);
        } catch (e) {
          throw new Error("Ungültige Serverantwort: " + text);
        }

        if (!result.success) {
          throw new Error(result.message || "Speichern fehlgeschlagen");
        }

        showMessage(
          "success",
          (result.message || "Gespeichert") + "\n" +
          "Spreadsheet: " + (result.data?.spreadsheetName || "-") + "\n" +
          "Sheet: " + (result.data?.sheetName || "-") + "\n" +
          "Fahrer: " + (result.data?.driverName || "-") + "\n" +
          "Zeile: " + (result.data?.lastRow || "-")
        );

        form.reset();
      } catch (error) {
        showMessage("error", error.message || "Fehler beim Speichern");
      }
    });
  </script>
</body>
</html>
