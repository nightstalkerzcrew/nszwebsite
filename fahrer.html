<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahrer anlegen</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
        url("background.jpg") center center / cover no-repeat fixed;
      min-height: 100vh;
      padding: 30px;
    }

    .box {
      max-width: 500px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.92);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
      color: #222;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
      color: #222;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      color: white;
      display: none;
    }

    .status.green {
      display: block;
      background: #28a745;
    }

    .status.red {
      display: block;
      background: #dc3545;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    button, a.link-btn {
      flex: 1;
      text-align: center;
      padding: 12px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      box-sizing: border-box;
    }

    button {
      background: #007bff;
    }

    button:hover {
      background: #0056b3;
    }

    a.link-btn {
      background: #6c757d;
      line-height: 20px;
    }

    a.link-btn:hover {
      background: #545b62;
    }

    .small-info {
      margin-top: 10px;
      color: #555;
      font-size: 14px;
    }

    ul {
      margin-top: 20px;
      padding-left: 18px;
      color: #222;
    }

    li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Fahrer anlegen</h1>

    <label for="fahrername">Fahrername</label>
    <input type="text" id="fahrername" placeholder="Fahrername eingeben">

    <label for="discordId">Discord ID</label>
    <input type="text" id="discordId" placeholder="Discord ID eingeben">

    <div id="statusBox" class="status"></div>

    <div class="buttons">
      <button onclick="fahrerPruefenUndSpeichern()">Fahrer speichern</button>
      <a class="link-btn" href="leaderboard.html">Zum Leaderboard</a>
    </div>

    <div class="small-info">
      Fahrername muss eindeutig sein. Discord ID darf mehrfach verwendet werden.
    </div>

    <ul id="fahrerliste"></ul>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz93Qa2kM8DRh1kIxaxVlCK-uGpDjqid2Rj1lpy7x8bIRMoQ6ZvhVqpu_IH_8tDWVHf/exec";

    function showStatus(type, message) {
      const statusBox = document.getElementById("statusBox");
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    async function fahrerPruefenUndSpeichern() {
      const fahrername = document.getElementById("fahrername").value.trim();
      const discordId = document.getElementById("discordId").value.trim();

      if (!fahrername || !discordId) {
        showStatus("red", "Bitte Fahrername und Discord ID eingeben.");
        return;
      }

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            fahrername: fahrername,
            discordId: discordId
          })
        });

        const result = await response.json();

        if (result.success) {
          showStatus("green", result.message);
          document.getElementById("fahrername").value = "";
          document.getElementById("discordId").value = "";
          ladeFahrer();
        } else {
          showStatus("red", result.message || "Fahrer konnte nicht gespeichert werden.");
        }

      } catch (error) {
        showStatus("red", "Fehler bei der Verbindung zum Server.");
      }
    }

    async function ladeFahrer() {
      const liste = document.getElementById("fahrerliste");
      liste.innerHTML = "<li>Lade Fahrer...</li>";

      try {
        const response = await fetch(API_URL + "?action=list");
        const result = await response.json();

        if (!result.success) {
          liste.innerHTML = "<li>Fahrer konnten nicht geladen werden.</li>";
          return;
        }

        if (!result.drivers || result.drivers.length === 0) {
          liste.innerHTML = "<li>Keine Fahrer vorhanden.</li>";
          return;
        }

        liste.innerHTML = "";

        result.drivers.forEach(fahrer => {
          const li = document.createElement("li");
          li.textContent = "Fahrername: " + fahrer.fahrername + " | Discord ID: " + fahrer.discordId;
          liste.appendChild(li);
        });

      } catch (error) {
        liste.innerHTML = "<li>Fahrer konnten nicht geladen werden.</li>";
      }
    }

    ladeFahrer();
  </script>
</body>
</html>
